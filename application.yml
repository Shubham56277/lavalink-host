lavalink:
  plugins:
    # Advanced search endpoint (stable, Lavalink v4 compatible)
    - dependency: com.github.topi314.lavasearch:lavasearch-plugin:1.0.0
      snapshot: false

    # Spotify, Apple Music, Flowery TTS and other sources (latest stable)
    - dependency: com.github.topi314.lavasrc:lavasrc-plugin:4.8.3
      snapshot: false

    # SponsorBlock segment skipping (latest stable)
    - dependency: com.github.topi314.sponsorblock:sponsorblock-plugin:3.0.1
      snapshot: false

    # YouTube source plugin replacing built-in source (latest stable)
    - dependency: dev.lavalink.youtube:youtube-plugin:1.18.1
      snapshot: false

  pluginsDir: ./plugins

  server:
    # Password is read from the LAVALINK_PASSWORD environment variable.
    # Do not hardcode secrets here.
    password: "${LAVALINK_PASSWORD}"

    sources:
      # Built-in YouTube source is disabled; youtube-plugin handles YouTube.
      youtube: false
      bandcamp: false
      soundcloud: true
      twitch: false
      vimeo: false
      nico: false
      http: true
      local: false

    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      rotation: true
      distortion: true
      channelMix: true
      lowPass: true

    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: HIGH
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    playerUpdateInterval: 5
    gc-warnings: true
    nonAllocatingFrameBuffer: false
    youtubePlaylistLoadLimit: 2
    youtubeSearchEnabled: false
    soundcloudSearchEnabled: true

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    # Clients are tried in order. TV removed because it requires OAuth sign-in.
    # TVHTML5_SIMPLY: added in v1.18.0, playlist support fix in v1.18.1, supports video/search/mix.
    # ANDROID_VR: stable, supports video/search/playlist/mix including livestreams.
    # WEB: stable, full support including livestreams.
    # MWEB: stable, full support including livestreams.
    # MUSIC: ytmsearch: prefix only, no standalone playback — used by lavasrc providers.
    clients:
      - TVHTML5_SIMPLY
      - ANDROID_VR
      - WEB
      - MWEB
      - MUSIC

    # OAuth is removed entirely. No refresh token, no skipInitialization.
    # If YouTube blocks requests with "Sign in to confirm you're not a bot",
    # that is a host IP / rate-limit issue. Do not add OAuth without a burner account.

  lavasrc:
    # Provider order: YouTube first (most accurate), YouTube Music second,
    # ISRC lookup third, SoundCloud last as fallback only.
    # SoundCloud is not first because its results may not match the intended track.
    providers:
      - "ytsearch:%QUERY%"
      - "ytmsearch:%QUERY%"
      - "ytsearch:\"%ISRC%\""
      - "scsearch:%QUERY%"

    sources:
      spotify: true
      applemusic: true
      deezer: false
      youtube: true
      yandexmusic: false
      flowerytts: true
      vkmusic: false
      tidal: false
      qobuz: false

    spotify:
      countryCode: IN
      playlistLoadLimit: 2
      albumLoadLimit: 4
      resolveArtistsInSearch: true
      localFiles: false

    applemusic:
      countryCode: IN
      playlistLoadLimit: 3
      albumLoadLimit: 3

    youtube:
      countryCode: IN
      language: en

    flowerytts:
      voice: Anushri
      translate: false
      silence: 500
      speed: 1
      audioFormat: flac

    lyrics-sources:
      spotify: true
      youtube: true
      deezer: false
      yandexmusic: false
      vkmusic: false

server:
  port: "${PORT:2333}"
  address: 0.0.0.0

  http2:
    enabled: false

logging:
  level:
    root: INFO
    lavalink: INFO
    # Reduced from DEBUG to INFO to avoid verbose output without exposing internals.
    dev.lavalink.youtube: INFO

  file:
    path: ./logs/
    max-size: 10MB
    max-history: 5

  request:
    # Request logging disabled to avoid exposing headers or payloads in logs.
    enabled: false
    includeClientInfo: false
    includeHeaders: false
    includePayload: false
    includeQueryString: false
    maxPayloadLength: 0

  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 5

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""
